services:
  - type: web
    name: fgceprojectmanager
    env: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app

    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fgceprojectmanager-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
databases:
  - name: fgceprojectmanager-db
    databaseName: fgceprojectmanager
    user: fgceprojectmanager_user
    plan: free
    region: singapore # Chọn region gần Việt Nam nhất có thể (Singapore)