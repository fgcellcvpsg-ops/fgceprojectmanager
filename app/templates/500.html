{% extends "base.html" %}
{% block title %}500 Internal Server Error{% endblock %}

{% block content %}
<div class="container mt-5 text-center">
    <h1>500</h1>
    <h2>Internal Server Error</h2>
    <p class="text-muted">Something went wrong on our end. We are working to fix it.</p>
    
    <!-- DEBUG: Show error details -->
    <div class="alert alert-danger text-start mt-4" style="max-width: 800px; margin: 0 auto; overflow: auto;">
        <h4>Error Details (Debug Mode):</h4>
        <pre>{{ error }}</pre>
    </div>

    <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary mt-3">Go Home</a>
</div>
{% endblock %}
