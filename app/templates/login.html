{% extends "base.html" %}
{% block title %}{{ t('title_login') }}{% endblock %}
{% block content %}
<div class="container mt-5 fade-in" style="max-width: 420px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h1 class="page-title text-center"><i class="fas fa-lock text-primary me-2"></i>{{ t('heading_login') }}</h1>

      <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <!-- Username / Email -->
        <div class="mb-3">
          <label for="username" class="form-label">{{ t('label_email_username') }}</label>
          <input type="text" class="form-control" id="username" name="username" required>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="form-label">{{ t('label_password') }}</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>

        <!-- Nút thao tác -->
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">🚀 {{ t('btn_login') }}</button>
        </div>
      </form>

      <hr class="my-3">
      <div class="text-center">
        <small class="text-muted">© 2025 FG Consulting Engineers — Project management system</small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
