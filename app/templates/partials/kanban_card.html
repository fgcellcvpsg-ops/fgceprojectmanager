<div class="card mb-2 shadow-sm task-card" data-task-id="{{ task.id }}" style="cursor: move;">
    <div class="card-body p-2">
        <h6 class="card-title mb-1">{{ task.name }}</h6>
        <p class="card-text small text-muted mb-1">
            {{ task.description[:50] if task.description else '' }}{% if task.description and task.description|length > 50 %}...{% endif %}
        </p>
        <div class="d-flex justify-content-between align-items-center">
            <span class="badge bg-secondary rounded-pill" style="font-size: 0.7em;">
                {{ task.assignee.display_name if task.assignee else 'Unassigned' }}
            </span>
            <small class="text-muted" style="font-size: 0.7em;">{{ task.deadline.strftime('%Y-%m-%d') if task.deadline else '' }}</small>
        </div>
    </div>
</div>
