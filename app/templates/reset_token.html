{% extends "base.html" %}
{% block title %}{{ t('title_reset_password') }}{% endblock %}
{% block content %}
<div class="container mt-5 fade-in" style="max-width: 420px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h1 class="page-title text-center"><i class="fas fa-unlock-alt text-primary me-2"></i>{{ t('heading_reset_password') }}</h1>

      <form method="POST" action="">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
          <label for="password" class="form-label">{{ t('label_new_password') }}</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>
        
        <div class="mb-4">
          <label for="confirm_password" class="form-label">{{ t('label_confirm_password') }}</label>
          <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary">{{ t('btn_update_password') }}</button>
        </div>
      </form>

      <hr class="my-3">
      <div class="text-center">
        <small class="text-muted">{{ t('footer_text') }}</small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
