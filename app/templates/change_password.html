{% extends "base.html" %}
{% block title %}{{ t('title_change_password') }}{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:600px;">
  <h1 class="page-title">
    <i class="fas fa-key me-2 text-primary"></i>{{ t('title_change_password') }}
  </h1>
  <form method="POST" class="mt-3">
    <div class="mb-3">
      <label class="form-label">{{ t('label_current_password') }}</label>
      <input type="password" name="current_password" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">{{ t('label_new_password') }}</label>
      <input type="password" name="new_password" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">{{ t('label_confirm_password') }}</label>
      <input type="password" name="confirm_password" class="form-control" required>
    </div>
    <div class="text-end">
      <button class="btn btn-primary">{{ t('btn_save') }}</button>
      <a class="btn btn-secondary" href="{{ url_for('main.dashboard') }}">{{ t('btn_cancel') }}</a>
    </div>
  </form>
</div>
{% endblock %}
